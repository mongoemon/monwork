<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Config Wizard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --accent: #3b82f6;
  --accent-bg: #eff6ff;
  --accent-dark: #1d4ed8;
  --success: #16a34a;
  --danger: #dc2626;
  --warn: #d97706;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 32px 16px;
  font-size: 14px;
  line-height: 1.5;
}

.wizard {
  max-width: 780px;
  margin: 0 auto;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* ── Header / step bar ───────────────────────────────── */
.wizard-header {
  padding: 28px 32px 0;
  background: var(--surface);
}
.wizard-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; letter-spacing: -.02em; }

.step-bar {
  display: flex;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
  gap: 0;
}
.step-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
  cursor: pointer;
  padding-bottom: 14px;
}
.step-item::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background .2s;
}
.step-item.active::after { background: var(--accent); }
.step-item.done::after   { background: var(--success); }

.step-row { display: flex; align-items: center; gap: 6px; }
.step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--border);
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.step-item.active .step-num { background: var(--accent); color: #fff; }
.step-item.done   .step-num { background: var(--success); color: #fff; }
.step-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
  transition: color .2s;
}
.step-item.active .step-label { color: var(--accent); font-weight: 600; }
.step-item.done   .step-label { color: var(--success); }

/* ── Body ────────────────────────────────────────────── */
.wizard-body {
  padding: 28px 32px;
  min-height: 440px;
}
.step-h { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.step-desc { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

/* ── Toggle switch ───────────────────────────────────── */
.toggle {
  width: 40px; height: 22px;
  background: var(--border);
  border-radius: 11px;
  cursor: pointer;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
  border: none;
  outline: none;
}
.toggle::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(18px); }

/* ── Page cards (step 0) ─────────────────────────────── */
.page-list { display: flex; flex-direction: column; gap: 8px; }
.page-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: grab;
  transition: border-color .15s, box-shadow .15s;
  user-select: none;
}
.page-card:hover { border-color: #cbd5e1; }
.page-card.dragging { opacity: .35; }
.page-card.drag-over { border-color: var(--accent); background: var(--accent-bg); }
.drag-handle { color: #cbd5e1; display: flex; align-items: center; }
.page-card-info { flex: 1; }
.page-card-name { font-weight: 600; font-size: 14px; }
.page-card-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.page-card.off .page-card-name { color: var(--muted); }

/* ── Accordion (step 1) ──────────────────────────────── */
.accordion {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}
.accordion-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  background: var(--surface);
  transition: background .15s;
}
.accordion-head:hover { background: var(--surface2); }
.accordion-head.open { background: var(--accent-bg); border-bottom: 1px solid var(--border); }
.acc-arrow { transition: transform .2s; color: var(--muted); font-size: 11px; }
.acc-arrow.open { transform: rotate(90deg); }
.acc-title { flex: 1; font-weight: 600; font-size: 14px; }
.acc-note { font-size: 11px; color: var(--muted); }
.accordion-body { display: none; }
.accordion-body.open { display: block; }
.sub-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
}
.sub-row:last-child { border-bottom: none; }
.sub-label { flex: 1; font-size: 14px; }
.sub-sheet {
  font-size: 11px; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px; font-family: monospace;
}

/* ── Mapping table (step 2) ──────────────────────────── */
.map-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.map-table th {
  background: var(--surface2); padding: 9px 12px;
  text-align: left; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.map-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.map-table tr:last-child td { border-bottom: none; }
.map-table tr.inactive td { color: #94a3b8; }
.map-table tr.inactive .chip { background: #f1f5f9; color: #94a3b8; border-color: var(--border); }
.chip {
  display: inline-block;
  background: var(--accent-bg); color: var(--accent-dark);
  font-size: 11px; font-family: monospace; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid #bfdbfe;
}
.status-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px;
}
.status-dot.on  { background: var(--success); }
.status-dot.off { background: #cbd5e1; }

/* ── Categories (step 3) ─────────────────────────────── */
.cat-head {
  display: grid; grid-template-columns: 110px 1fr 1fr 32px;
  gap: 6px; padding: 0 2px; margin-bottom: 6px;
}
.cat-head span { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.cat-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.cat-row {
  display: grid; grid-template-columns: 110px 1fr 1fr 32px;
  gap: 6px; align-items: center;
}
.f-input {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 9px; font-size: 13px; width: 100%;
  background: var(--surface); transition: border-color .15s;
}
.f-input:focus { outline: none; border-color: var(--accent); }

/* ── Custom pages (step 4) ───────────────────────────── */
.cp-card {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; background: var(--surface2);
}
.cp-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cp-title { flex: 1; font-weight: 600; font-size: 15px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.f-group { display: flex; flex-direction: column; gap: 4px; }
.f-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.f-hint  { font-size: 11px; color: #94a3b8; font-weight: 400; text-transform: none; letter-spacing: 0; }

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 6px; font-size: 13px;
  font-weight: 500; cursor: pointer; border: 1px solid transparent;
  transition: all .15s; line-height: 1;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-primary:hover  { background: var(--accent-dark); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost  { background: none; color: var(--muted); border-color: transparent; }
.btn-ghost:hover { color: var(--danger); }
.btn-danger { background: var(--surface); color: var(--danger); border-color: var(--border); }
.btn-danger:hover { background: #fef2f2; border-color: var(--danger); }
.btn-add {
  width: 100%; justify-content: center;
  background: none; color: var(--muted);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius); padding: 9px;
  font-size: 13px; cursor: pointer;
  transition: all .15s;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 4px; color: var(--muted); font-size: 17px;
  line-height: 1; transition: color .15s; border-radius: 4px;
}
.icon-btn:hover { color: var(--danger); }

/* ── Export (step 5) ─────────────────────────────────── */
.code-wrap {
  background: #1e1e2e; border-radius: var(--radius);
  padding: 18px 20px; margin-bottom: 14px;
  max-height: 380px; overflow: auto;
}
.code-wrap pre {
  color: #cdd6f4; font-family: 'Cascadia Code','Fira Code',Consolas,monospace;
  font-size: 12.5px; line-height: 1.65; white-space: pre;
}
.export-row { display: flex; gap: 8px; flex-wrap: wrap; }
.export-note {
  margin-top: 14px; padding: 10px 14px;
  background: #fefce8; border: 1px solid #fde68a;
  border-radius: 6px; font-size: 12px; color: #92400e;
}

/* ── Footer ──────────────────────────────────────────── */
.wizard-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 32px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.footer-info { font-size: 12px; color: var(--muted); }
.footer-btns { display: flex; gap: 8px; }

/* ── Animations ──────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.fade-up { animation: fadeUp .2s ease; }
</style>
</head>
<body>

<script src="config.js"></script>

<div class="wizard">
  <div class="wizard-header">
    <h1 class="wizard-title">Portfolio Config Wizard</h1>
    <div class="step-bar" id="stepBar"></div>
  </div>
  <div class="wizard-body" id="wizardBody"></div>
  <div class="wizard-footer">
    <span class="footer-info" id="footerInfo"></span>
    <div class="footer-btns">
      <button class="btn btn-secondary" id="btnPrev">← Back</button>
      <button class="btn btn-primary"   id="btnNext">Next →</button>
    </div>
  </div>
</div>

<script>
// ─── Built-in page definitions ───────────────────────────────────────────────

const BUILTIN = [
  {
    id: 'home', label: 'Home', meta: 'Hero banner, recent projects, contact form',
    sub: [
      { id: 'hero',          label: 'Hero Banner',     sheet: 'Profile'  },
      { id: 'recentProjects',label: 'Recent Projects', sheet: 'Project'  },
      { id: 'contactForm',   label: 'Contact Form',    sheet: null       },
    ],
  },
  {
    id: 'about', label: 'About', meta: 'Profile, experience, education, skills',
    sub: [
      { id: 'experience',    label: 'Experience',    sheet: 'Experience'    },
      { id: 'education',     label: 'Education',     sheet: 'Education'     },
      { id: 'certifications',label: 'Certifications',sheet: 'Certifications'},
      { id: 'awards',        label: 'Awards',        sheet: 'Awards'        },
      { id: 'skills',        label: 'Skills',        sheet: 'Skills'        },
      { id: 'tools',         label: 'Tools',         sheet: 'Tools'         },
    ],
  },
  { id: 'projects',   label: 'Projects',   meta: 'Project gallery with search and category tabs', sub: [] },
  { id: 'playground', label: 'Playground', meta: 'Personal side-project experiments',             sub: [] },
  { id: 'join',       label: 'Join',       meta: 'Collaboration / application form',              sub: [] },
  { id: 'contact',    label: 'Contact',    meta: 'Nav link (contact form lives in Home)',          sub: [] },
];

const STEPS = ['Pages', 'Sub-sections', 'Xlsx Mapping', 'Categories', 'Custom Pages', 'Export'];

// ─── State (load from window.siteConfig if available) ────────────────────────

const existing = window.siteConfig || {};
const exPages  = existing.pages || {};
const exSub    = existing.subSections || {};

const defaultEnabled = { home:false, about:true, projects:true, playground:true, join:true, contact:false };

function resolveEnabled(id) {
  const v = exPages[id];
  if (typeof v === 'boolean') return v;
  if (v && typeof v === 'object') return v.enabled !== false;
  return defaultEnabled[id] !== undefined ? defaultEnabled[id] : true;
}

const state = {
  pageOrder: (() => {
    const known = BUILTIN.map(p => p.id);
    const base  = Array.isArray(existing.pageOrder)
      ? existing.pageOrder.filter(id => known.includes(id))
      : known;
    return base;
  })(),

  pageEnabled: Object.fromEntries(BUILTIN.map(p => [p.id, resolveEnabled(p.id)])),

  subSections: Object.fromEntries(
    BUILTIN.filter(p => p.sub.length).map(p => {
      const ex = exSub[p.id] || {};
      return [p.id, Object.fromEntries(p.sub.map(s => [s.id, s.id in ex ? ex[s.id] : true]))];
    })
  ),

  projectCategories: (existing.projectCategories || [
    { value:'Software', en:'Software',  th:'ซอฟต์แวร์' },
    { value:'Game',     en:'Game',      th:'เกม'       },
    { value:'etc.',     en:'etc.',      th:'อื่นๆ'     },
  ]).map(c => ({ ...c })),

  customPages: (existing.customPages || []).map(p => ({
    id: p.id || '',
    label: { en: p.label?.en || '', th: p.label?.th || '' },
    xlsxSheet: p.xlsxSheet || '',
    fields: { title: p.fields?.title || '', description: p.fields?.description || '', date: p.fields?.date || '', link: p.fields?.link || '' },
  })),

  clarityId:          existing.clarityId          ?? 'wtfvkk0n07',
  staleWarningMonths: existing.staleWarningMonths  ?? 6,
};

// ─── Step routing ─────────────────────────────────────────────────────────────

let currentStep = 0;

function setStep(n) {
  currentStep = Math.max(0, Math.min(STEPS.length - 1, n));
  render();
  window.scrollTo(0, 0);
}

document.getElementById('btnPrev').onclick = () => setStep(currentStep - 1);
document.getElementById('btnNext').onclick = () => {
  if (currentStep === STEPS.length - 1) return;
  setStep(currentStep + 1);
};

// ─── Top-level render ─────────────────────────────────────────────────────────

function render() {
  renderStepBar();
  renderBody();
  renderFooter();
}

function renderStepBar() {
  document.getElementById('stepBar').innerHTML = STEPS.map((label, i) => {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    const num = i < currentStep ? '✓' : i + 1;
    return `<div class="step-item ${cls}" onclick="setStep(${i})">
      <div class="step-row">
        <div class="step-num">${num}</div>
        <div class="step-label">${label}</div>
      </div>
    </div>`;
  }).join('');
}

function renderFooter() {
  const isLast = currentStep === STEPS.length - 1;
  const btn = document.getElementById('btnNext');
  btn.textContent = isLast ? '✓ Done' : 'Next →';
  btn.onclick = isLast ? () => {} : () => setStep(currentStep + 1);
  document.getElementById('btnPrev').style.display = currentStep === 0 ? 'none' : '';
  document.getElementById('footerInfo').textContent = `Step ${currentStep + 1} of ${STEPS.length}`;
}

const RENDERERS = [renderPages, renderSubSections, renderMapping, renderCategories, renderCustomPages, renderExport];

function renderBody() {
  document.getElementById('wizardBody').innerHTML =
    `<div class="fade-up">${RENDERERS[currentStep]()}</div>`;
}

// ─── Step 0 – Pages ───────────────────────────────────────────────────────────

function renderPages() {
  const cards = state.pageOrder
    .map(id => BUILTIN.find(p => p.id === id))
    .filter(Boolean)
    .map(p => pageCard(p))
    .join('');
  return `
    <h2 class="step-h">Pages</h2>
    <p class="step-desc">Toggle pages on or off. Drag rows to set the navigation order.</p>
    <div class="page-list" id="pageList">${cards}</div>`;
}

function pageCard(p) {
  const on = state.pageEnabled[p.id];
  return `<div class="page-card${on ? '' : ' off'}" draggable="true" data-id="${p.id}"
    ondragstart="dstart(event,'${p.id}')"
    ondragover="dover(event)"
    ondrop="ddrop(event,'${p.id}')"
    ondragend="dend(event)">
    <div class="drag-handle">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <circle cx="4" cy="3" r="1.3"/><circle cx="4" cy="7" r="1.3"/><circle cx="4" cy="11" r="1.3"/>
        <circle cx="10" cy="3" r="1.3"/><circle cx="10" cy="7" r="1.3"/><circle cx="10" cy="11" r="1.3"/>
      </svg>
    </div>
    <div class="page-card-info">
      <div class="page-card-name">${p.label}</div>
      <div class="page-card-meta">${p.meta}</div>
    </div>
    <button class="toggle${on ? ' on' : ''}" onclick="togglePage('${p.id}')"></button>
  </div>`;
}

// ─── Step 1 – Sub-sections ────────────────────────────────────────────────────

function renderSubSections() {
  const blocks = BUILTIN.filter(p => p.sub.length).map(p => {
    const on   = state.pageEnabled[p.id];
    const subs = state.subSections[p.id] || {};
    const rows = p.sub.map(s => `
      <div class="sub-row">
        <div class="sub-label">${s.label}</div>
        ${s.sheet ? `<span class="sub-sheet">${s.sheet}</span>` : ''}
        <button class="toggle${subs[s.id] !== false ? ' on' : ''}" onclick="toggleSub('${p.id}','${s.id}')"></button>
      </div>`).join('');
    return `<div class="accordion" id="acc-${p.id}">
      <div class="accordion-head${on ? ' open' : ''}" onclick="toggleAcc('${p.id}')">
        <span class="acc-arrow${on ? ' open' : ''}">▶</span>
        <span class="acc-title">${p.label}</span>
        ${!on ? '<span class="acc-note">(page disabled)</span>' : ''}
      </div>
      <div class="accordion-body${on ? ' open' : ''}">${rows}</div>
    </div>`;
  }).join('');
  return `
    <h2 class="step-h">Sub-sections</h2>
    <p class="step-desc">Choose which content blocks appear inside each page.</p>
    ${blocks}`;
}

// ─── Step 2 – Xlsx Mapping ────────────────────────────────────────────────────

function renderMapping() {
  const sheetMap = { home:['Profile'], projects:['Project'], playground:['Playground'], contact:['Contact'], join:[] };
  const rows = [];

  state.pageOrder.forEach(id => {
    const p = BUILTIN.find(x => x.id === id);
    if (!p) return;
    const pgOn = state.pageEnabled[id];

    if (p.sub.length) {
      const subs = state.subSections[id] || {};
      p.sub.filter(s => s.sheet).forEach(s => {
        const on = pgOn && subs[s.id] !== false;
        rows.push({ section: `${p.label} › ${s.label}`, sheet: s.sheet, on });
      });
    } else {
      (sheetMap[id] || []).forEach(sheet =>
        rows.push({ section: p.label, sheet, on: pgOn })
      );
    }
  });

  state.customPages.forEach(cp => {
    if (cp.xlsxSheet) rows.push({ section: `${cp.label.en || cp.id} (custom)`, sheet: cp.xlsxSheet, on: true });
  });

  const trs = rows.map(r => `
    <tr class="${r.on ? '' : 'inactive'}">
      <td>${esc(r.section)}</td>
      <td><span class="chip">${esc(r.sheet)}</span></td>
      <td><span class="status-dot ${r.on ? 'on' : 'off'}"></span>${r.on ? 'Active' : 'Inactive'}</td>
    </tr>`).join('');

  return `
    <h2 class="step-h">Xlsx Sheet Mapping</h2>
    <p class="step-desc">Each section reads from the matching sheet in <code>data.xlsx</code>. Inactive sections are grayed out.</p>
    <table class="map-table">
      <thead><tr><th>Section</th><th>Sheet</th><th>Status</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
}

// ─── Step 3 – Project Categories ─────────────────────────────────────────────

function renderCategories() {
  const rows = state.projectCategories.map((c, i) => `
    <div class="cat-row">
      <input class="f-input" value="${esc(c.value)}" placeholder="Software"
        oninput="state.projectCategories[${i}].value=this.value">
      <input class="f-input" value="${esc(c.en)}"    placeholder="Software"
        oninput="state.projectCategories[${i}].en=this.value">
      <input class="f-input" value="${esc(c.th)}"    placeholder="ซอฟต์แวร์"
        oninput="state.projectCategories[${i}].th=this.value">
      <button class="icon-btn" onclick="removeCat(${i})">×</button>
    </div>`).join('');

  return `
    <h2 class="step-h">Project Categories</h2>
    <p class="step-desc">Define the filter tabs on the Projects page. <strong>Value</strong> must match the <code>Project_Category</code> column in <code>data.xlsx</code>.</p>
    <div class="cat-head">
      <span>Value</span><span>English label</span><span>Thai label</span><span></span>
    </div>
    <div class="cat-rows">${rows}</div>
    <button class="btn-add" onclick="addCat()">+ Add Category</button>`;
}

// ─── Step 4 – Custom Pages ────────────────────────────────────────────────────

function renderCustomPages() {
  const cards = state.customPages.map((cp, i) => `
    <div class="cp-card">
      <div class="cp-head">
        <span class="cp-title">${esc(cp.label.en) || 'Custom Page ' + (i + 1)}</span>
        <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="removeCP(${i})">Remove</button>
      </div>
      <div class="field-grid">
        <div class="f-group">
          <label class="f-label">Page ID <span class="f-hint">(no spaces, used in URL hash)</span></label>
          <input class="f-input" value="${esc(cp.id)}" placeholder="blog"
            oninput="state.customPages[${i}].id=this.value;renderBody()">
        </div>
        <div class="f-group">
          <label class="f-label">Xlsx Sheet Name</label>
          <input class="f-input" value="${esc(cp.xlsxSheet)}" placeholder="Blog"
            oninput="state.customPages[${i}].xlsxSheet=this.value">
        </div>
        <div class="f-group">
          <label class="f-label">Nav Label (EN)</label>
          <input class="f-input" value="${esc(cp.label.en)}" placeholder="Blog"
            oninput="state.customPages[${i}].label.en=this.value;renderBody()">
        </div>
        <div class="f-group">
          <label class="f-label">Nav Label (TH)</label>
          <input class="f-input" value="${esc(cp.label.th)}" placeholder="บล็อก"
            oninput="state.customPages[${i}].label.th=this.value">
        </div>
        <div class="f-group">
          <label class="f-label">Title Column <span class="f-hint">(column header in xlsx)</span></label>
          <input class="f-input" value="${esc(cp.fields.title)}" placeholder="Title"
            oninput="state.customPages[${i}].fields.title=this.value">
        </div>
        <div class="f-group">
          <label class="f-label">Description Column</label>
          <input class="f-input" value="${esc(cp.fields.description)}" placeholder="Content"
            oninput="state.customPages[${i}].fields.description=this.value">
        </div>
        <div class="f-group">
          <label class="f-label">Date Column <span class="f-hint">(optional)</span></label>
          <input class="f-input" value="${esc(cp.fields.date)}" placeholder="Date"
            oninput="state.customPages[${i}].fields.date=this.value">
        </div>
        <div class="f-group">
          <label class="f-label">Link Column <span class="f-hint">(optional)</span></label>
          <input class="f-input" value="${esc(cp.fields.link)}" placeholder="URL"
            oninput="state.customPages[${i}].fields.link=this.value">
        </div>
      </div>
    </div>`).join('');

  return `
    <h2 class="step-h">Custom Pages</h2>
    <p class="step-desc">Add pages beyond the built-in set. Each custom page loads rows from a named xlsx sheet and renders them as cards.</p>
    <div id="cpList">${cards}</div>
    <button class="btn-add" onclick="addCP()">+ Add Custom Page</button>`;
}

// ─── Step 5 – Export ──────────────────────────────────────────────────────────

function renderExport() {
  const code = buildConfig();
  return `
    <h2 class="step-h">Review &amp; Export</h2>
    <p class="step-desc">Copy or download the generated <code>config.js</code>, then replace the file in your <code>portfolio4/</code> folder.</p>
    <div class="code-wrap"><pre id="codeEl">${esc(code)}</pre></div>
    <div class="export-row">
      <button class="btn btn-primary"    onclick="dlConfig()">⬇ Download config.js</button>
      <button class="btn btn-secondary"  onclick="copyConfig(event)">⎘ Copy to Clipboard</button>
    </div>
    <div class="export-note">
      After replacing <code>config.js</code>, reload <code>index.html</code> in your browser to see the changes.
      Custom pages also require adding the matching sheet to <code>data.xlsx</code>.
    </div>`;
}

// ─── Config generator ─────────────────────────────────────────────────────────

function buildConfig() {
  const pages = {};
  state.pageOrder.forEach(id => { pages[id] = state.pageEnabled[id]; });
  state.customPages.forEach(cp => { if (cp.id) pages[cp.id] = true; });

  const obj = {
    clarityId:          state.clarityId,
    staleWarningMonths: state.staleWarningMonths,
    pages,
    pageOrder:    [...state.pageOrder, ...state.customPages.map(c => c.id).filter(Boolean)],
    subSections:  state.subSections,
    projectCategories: state.projectCategories,
    customPages:  state.customPages,
  };

  return 'var siteConfig = ' + JSON.stringify(obj, null, 4) + ';';
}

// ─── Action handlers ──────────────────────────────────────────────────────────

function togglePage(id) {
  state.pageEnabled[id] = !state.pageEnabled[id];
  renderBody();
}

function toggleSub(pageId, subId) {
  state.subSections[pageId][subId] = !state.subSections[pageId][subId];
  renderBody();
}

function toggleAcc(id) {
  const acc  = document.getElementById('acc-' + id);
  const head = acc.querySelector('.accordion-head');
  const body = acc.querySelector('.accordion-body');
  const arr  = acc.querySelector('.acc-arrow');
  [head, body, arr].forEach(el => el.classList.toggle('open'));
}

function addCat() {
  state.projectCategories.push({ value:'', en:'', th:'' });
  renderBody();
}
function removeCat(i) {
  state.projectCategories.splice(i, 1);
  renderBody();
}

function addCP() {
  state.customPages.push({ id:'', label:{ en:'', th:'' }, xlsxSheet:'', fields:{ title:'', description:'', date:'', link:'' } });
  renderBody();
}
function removeCP(i) {
  state.customPages.splice(i, 1);
  renderBody();
}

function dlConfig() {
  const blob = new Blob([buildConfig()], { type:'text/javascript' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'config.js' });
  a.click();
}

async function copyConfig(e) {
  try {
    await navigator.clipboard.writeText(buildConfig());
    const btn = e.currentTarget;
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  } catch { alert('Copy failed — please select and copy the code manually.'); }
}

// ─── Drag-and-drop (page reorder) ────────────────────────────────────────────

let _drag = null;

function dstart(e, id) {
  _drag = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dover(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.target.closest('.page-card');
  document.querySelectorAll('.page-card').forEach(c => c.classList.remove('drag-over'));
  if (card && card.dataset.id !== _drag) card.classList.add('drag-over');
}
function ddrop(e, targetId) {
  e.preventDefault();
  if (!_drag || _drag === targetId) return;
  const from = state.pageOrder.indexOf(_drag);
  const to   = state.pageOrder.indexOf(targetId);
  state.pageOrder.splice(from, 1);
  state.pageOrder.splice(to, 0, _drag);
  _drag = null;
  renderBody();
}
function dend(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.page-card').forEach(c => c.classList.remove('drag-over'));
}

// ─── Utility ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
